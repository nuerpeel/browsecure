<!DOCTYPE html>
<html>
<head>
    <title>ACME Corp Secure Login</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-container { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .logo { font-size: 24px; font-weight: bold; color: #333; margin-bottom: 20px; }
        input[type="text"], input[type="password"] { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #0056b3; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; transition: background-color 0.3s; }
        button:hover { background-color: #004494; }
        .footer { margin-top: 20px; font-size: 12px; color: #777; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">ACME Corp SSO</div>
        <p>Sign in to access your dashboard</p>
        <form action="/auth/login" method="POST">
            <input type="text" name="username" placeholder="Company Email" required />
            <input type="password" name="password" placeholder="Password" required />
            <button type="submit" id="sso-btn">SSO Login</button>
        </form>
        <div class="footer">
            &copy; 2026 ACME Corporation. All rights reserved.
        </div>
    </div>
    
    <script>
        // Normal, benign client-side validation logic
        document.getElementById('sso-btn').addEventListener('click', function(e) {
            console.log("Login button clicked. Form validation initiated.");
            // No malicious overlays, no evals, no hidden text.
        });
    </script>
</body>
</html>
